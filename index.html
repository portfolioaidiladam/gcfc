<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden City FC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <div class="logo-section">
        <div class="logo-badge">
            <img src="img/Logo.jpeg" alt="GCFC Logo">
        </div>
        <h1 class="club-name">Golden City FC</h1>
        <p class="club-subtitle">Football Club</p>
        <p class="club-est">&#9733; Est. 2020 &#9733;</p>
    </div>

    <div class="divider"></div>

    <div class="links">

        <a href="https://wa.me/62881012468092?text=Halo%20admin%20GCFC%2C%20saya%20mau%20tanya%20info%20main" target="_blank" class="link-btn btn-chat">
            <div class="btn-icon">💬</div>
            <span class="btn-label">Chat Admin</span>
            <span class="btn-arrow">→</span>
        </a>

        <a href="https://chat.whatsapp.com/C5UpvRMzaOkLKMpQHX3M5l" target="_blank" class="link-btn btn-join">
            <div class="btn-icon">👥</div>
            <span class="btn-label">Join Grup GCFC</span>
            <span class="btn-arrow">→</span>
        </a>

        <!-- Sementara arahkan ke WA admin, nanti ganti ke Google Form -->
        <a href="https://wa.me/62881012468092?text=Halo%20admin%2C%20saya%20mau%20daftar%20main%20GCFC" target="_blank" class="link-btn btn-form">
            <div class="btn-icon">📋</div>
            <span class="btn-label">Daftar Main / Isi Absen</span>
            <span class="btn-arrow">→</span>
        </a>

        <a href="#jadwal" class="link-btn btn-schedule">
            <div class="btn-icon">📅</div>
            <span class="btn-label">Lihat Jadwal</span>
            <span class="btn-arrow">↓</span>
        </a>

        <a href="https://www.instagram.com/gcfc_footballclub" target="_blank" class="link-btn btn-instagram">
            <div class="btn-icon">📸</div>
            <span class="btn-label">Instagram GCFC</span>
            <span class="btn-arrow">→</span>
        </a>

    </div>

    <div class="schedule" id="jadwal">
        <div class="schedule-title">📅 Jadwal Main</div>
        <div class="schedule-item">
            <div>
                <div class="schedule-day">Sabtu Fun Game</div>
                <div class="schedule-detail">📍 Lap. Jaladapura, Bekasi Timur</div>
            </div>
            <div class="schedule-time">15:30 - 17:30</div>
        </div>
    </div>

    <div class="footer">
        <p>GOLDEN CITY FOOTBALL CLUB</p>
        <p class="est">★ EST 2020 ★</p>
    </div>

</div>
</body>
</html>
